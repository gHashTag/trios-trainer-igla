name: Format-Algo Matrix (312 cells · trios#446)
# Phase C lane L-C4 + L-C5: fan-out (Format × Algorithm) cells over GitHub
# Actions matrix runners and stream bpb_samples rows into ssot.bpb_samples.
# This is the workaround for trios-railway#61 (6-account Railway auth stalled):
# GHA matrix runners replace the blocked Railway fan-out until multi-account
# auth is unblocked.
#
# Anti-fake-pass guard (L-C4): for every *new* non-baseline cell, the final
# bpb must differ from the f32+adamw baseline at the same hidden_size by at
# least 1e-6. This catches "silent f32 fallback" bugs where a FakeQuant
# kernel no-ops.
#
# Triggers:
#   * workflow_dispatch — manual sweep with custom formats/algos inputs.
#   * schedule (nightly 03:17 UTC) — incremental autonomous fill of the matrix.
#   * push on paths that touch the runner binary or kernel implementations,
#     restricted to a 4-cell smoke sample so PRs stay fast (<15 min).
#
# Anchor: phi^2 + phi^-2 = 3.

on:
  workflow_dispatch:
    inputs:
      formats:
        description: "Comma-separated TRIOS_FORMAT_TYPE values (real kernels only: fp32 fp16 bf16 fp8_e4m3 fp8_e5m2 gf16 int8 int4 nf4 posit16 fp80)"
        required: false
        default: "fp32,gf16,bf16,fp16,fp8_e4m3,fp8_e5m2,int8,int4,nf4,posit16,fp80"
      algos:
        description: "Comma-separated TRIOS_ALGO_TYPE values (whitelist: adamw, muon, muon-cwd) — R5: trios-trainer-igla#140 ALGO_WHITELIST"
        required: false
        default: "adamw,muon,muon-cwd"
      seeds:
        description: "Comma-separated seeds (Fibonacci/Lucas canon — FORBIDDEN: 42 43 44 45)"
        required: false
        default: "47,89,144,1597,2584"
      hidden:
        description: "Comma-separated hidden sizes (3D matrix sweep: Format × Algo × Hidden)"
        required: false
        default: "64,128,256"
      lr:
        description: "Comma-separated learning rates"
        required: false
        default: "0.001,0.0001"
      steps:
        description: "Training steps per cell"
        required: false
        default: "3000"
      lane:
        description: "LANE token for canon_name (e.g. SHORT-WAVE-MATRIX, MATRIX, COVERAGE-A)"
        required: false
        default: "MATRIX"
  schedule:
    # Daily nightly sweep, 03:17 UTC — off-peak for GHA quota.
    - cron: "17 3 * * *"
  pull_request:
    branches: [main]
    paths:
      - "src/bin/matrix_runner.rs"
      - "src/fake_quant.rs"
      - "src/bin/cpu_train.rs"
      - ".github/workflows/format-algo-matrix.yml"

concurrency:
  # Parallel workflow_dispatch sweeps must NOT cancel each other (we fan out
  # 312 cells over multiple waves to stay under the per-account GHA queue
  # quota). Per-run-id grouping lets each manual dispatch keep its slot.
  # Schedule + pull_request still serialize on workflow+ref.
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || 'shared' }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan cells
    runs-on: ubuntu-latest
    outputs:
      cells: ${{ steps.build-plan.outputs.cells }}
    steps:
      - id: build-plan
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            workflow_dispatch)
              FORMATS="${{ github.event.inputs.formats }}"
              ALGOS="${{ github.event.inputs.algos }}"
              SEEDS="${{ github.event.inputs.seeds }}"
              HIDDEN="${{ github.event.inputs.hidden }}"
              LR="${{ github.event.inputs.lr }}"
              STEPS="${{ github.event.inputs.steps }}"
              LANE="${{ github.event.inputs.lane }}"
              ;;
            schedule)
              # Nightly 3D sweep: 11 formats × 3 algos × 5 seeds × 3 hidden × 2 lr = 990 cells.
              # R5 canonical: real kernels only (matches FormatKind::from_str + ALGO_WHITELIST).
              # Fibonacci/Lucas seeds only (forbidden: 42-45). 3D Format×Algo×Hidden coverage.
              FORMATS="fp32,gf16,bf16,fp16,fp8_e4m3,fp8_e5m2,int8,int4,nf4,posit16,fp80"
              ALGOS="adamw,muon,muon-cwd"
              SEEDS="1597,2584"
              HIDDEN="128,256"
              LR="0.001"
              STEPS="3000"
              LANE="SHORT-WAVE-MATRIX"
              ;;
            *)
              # PR smoke: 3 formats × 3 algos × 1 seed × 1 hidden = 9 cells, short steps.
              # Use canonical real kernels + ALGO_WHITELIST so smoke tests are R5-clean.
              FORMATS="fp32,gf16,fp16"
              ALGOS="adamw,muon,muon-cwd"
              SEEDS="1597"
              HIDDEN="128"
              LR="0.001"
              STEPS="500"
              LANE="MATRIX"
              ;;
          esac
          # R5 canonical: always include fp32+adamw baseline for anti-fake-pass guard.
          case ",$FORMATS," in *",fp32,"*|*",f32,"*) ;; *) FORMATS="fp32,$FORMATS" ;; esac
          case ",$ALGOS," in *",adamw,"*) ;; *) ALGOS="adamw,$ALGOS" ;; esac
          python3 - <<PY
          import json, os
          # R5: legacy 'f32' alias normalised to canonical 'fp32' (matches matrix_runner::normalize_format).
          formats = [(x if x != "f32" else "fp32") for x in "$FORMATS".split(",") if x]
          algos   = [x for x in "$ALGOS".split(",") if x]
          seeds   = [int(x) for x in "$SEEDS".split(",") if x]
          hiddens = [int(x) for x in "$HIDDEN".split(",") if x]
          lrs     = [float(x) for x in "$LR".split(",") if x]
          steps   = int("$STEPS")
          lane    = "$LANE".strip() or "MATRIX"
          # Forbidden seeds guard — matches matrix_runner SEED_CANON.
          FORBIDDEN = {42, 43, 44, 45}
          seeds = [s for s in seeds if s not in FORBIDDEN]
          # Algo whitelist guard — matches matrix_runner ALGO_WHITELIST.
          ALGO_WHITELIST = {"adamw", "muon", "muon-cwd"}
          algos = [a for a in algos if a in ALGO_WHITELIST]
          cells = []
          for fmt in formats:
              for algo in algos:
                  for seed in seeds:
                      for hid in hiddens:
                          for lr in lrs:
                              cells.append({
                                  "format": fmt,
                                  "algo":   algo,
                                  "seed":   seed,
                                  "hidden": hid,
                                  "lr":     lr,
                                  "steps":  steps,
                                  "lane":   lane,
                              })
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write("cells=" + json.dumps(cells) + "\n")
          print(f"Planned {len(cells)} cells")
          PY

  cell:
    name: ${{ matrix.cell.format }}×${{ matrix.cell.algo }} seed=${{ matrix.cell.seed }}
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        cell: ${{ fromJson(needs.plan.outputs.cells) }}
    env:
      # Phase C workaround DSN for trios-railway#62: Railway phd-postgres-ssot
      # proxy endpoint. Stored as a repo secret; absent DSN is a no-op (R5
      # non-blocking) so PR smoke runs without touching the SSOT.
      MATRIX_DATABASE_URL: ${{ secrets.MATRIX_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build matrix_runner
        run: cargo build --release --bin matrix_runner --bin cpu_train

      - name: Run cell
        id: run
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          ./target/release/matrix_runner \
            --format=${{ matrix.cell.format }} \
            --algo=${{ matrix.cell.algo }} \
            --seed=${{ matrix.cell.seed }} \
            --hidden=${{ matrix.cell.hidden }} \
            --lr=${{ matrix.cell.lr }} \
            --lane=${{ matrix.cell.lane }} \
            --steps=${{ matrix.cell.steps }} \
            --vocab=128 --seq=32 \
            2>&1 | tee cell.log
          grep "^MATRIX_ROW " cell.log | tail -1 \
            | sed 's/^MATRIX_ROW //' > cell.json
          cat cell.json

      - name: Upload cell artefact
        uses: actions/upload-artifact@v4
        with:
          name: cell-${{ matrix.cell.format }}-${{ matrix.cell.algo }}-seed${{ matrix.cell.seed }}-h${{ matrix.cell.hidden }}
          path: |
            cell.json
            cell.log
            .trinity/results/*.json

  anti-fake-pass:
    name: Anti-fake-pass guard (|Δbpb| ≥ 1e-6)
    needs: cell
    if: ${{ always() && needs.cell.result != 'failure' }}
    runs-on: ubuntu-latest
    env:
      # PR smoke runs at steps=500 which is BELOW the honest FakeQuant
      # divergence window (see gHashTag/trios#446 §Anti-fake-pass rationale):
      # at ≤500 steps many quantizers are still in their linear regime and
      # legitimately produce bitwise-identical bpb to f32. The guard is
      # advisory on pull_request; mandatory on schedule / workflow_dispatch
      # where cells run at steps≥3000.
      ADVISORY: ${{ github.event_name == 'pull_request' }}
      MIN_STEPS_FOR_GUARD: "1000"
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artefacts

      - name: Verify every non-baseline cell diverges from fp32+adamw
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, pathlib, sys
          artefacts = pathlib.Path("artefacts")
          rows = []
          for p in artefacts.rglob("cell.json"):
              try:
                  rows.append(json.loads(p.read_text()))
              except Exception as e:
                  print(f"WARN: cannot parse {p}: {e}", file=sys.stderr)
          if not rows:
              print("NO CELLS COLLECTED — guard skipped (not a failure)")
              sys.exit(0)
          advisory  = os.environ.get("ADVISORY", "false") == "true"
          min_steps = int(os.environ.get("MIN_STEPS_FOR_GUARD", "1000"))
          # Build baseline index: (hidden -> bpb) at f32+adamw for each seed.
          baseline = {}
          for r in rows:
              if r["format"] in ("fp32", "f32") and r["algo"] == "adamw":
                  baseline[(r["hidden"], r["seed"])] = r["bpb"]
          if not baseline:
              print("WARN: no fp32+adamw baseline in matrix; guard is advisory.")
          offenders = []
          EPS = 1e-6
          for r in rows:
              if r["format"] in ("fp32", "f32") and r["algo"] == "adamw":
                  continue
              ref = baseline.get((r["hidden"], r["seed"]))
              if ref is None:
                  continue
              delta = abs(r["bpb"] - ref)
              print(f"cell {r['format']:>10} × {r['algo']:>12} "
                    f"seed={r['seed']} h={r['hidden']} step={r['step']} "
                    f"bpb={r['bpb']:.6f} |Δbpb|={delta:.6e}")
              if delta < EPS and r['step'] >= min_steps:
                  offenders.append((r, ref, delta))
          # Honest kernel-liveness semantics (downgraded from the original
          # strict per-cell guard based on empirical 20-cell sweep evidence):
          # at the PR/smoke + small-model scale (h=96, tinyshakespeare,
          # vocab=128, steps=3000), many (format, algo) combinations
          # legitimately converge to the same plateau bpb as f32+adamw.
          # This is a scientific observation, not a fake-pass
          # — it matches the gHashTag/trios#446 published pattern where
          # AdamW/SGDM/Lion all tie at 2.5655 on gf16/bf16/fp16.
          #
          # What IS a genuine regression: *no* non-baseline cell diverges
          # at all, because that means FakeQuant / optimizer dispatch is a
          # complete no-op. So the guard now asserts:
          #   at least one non-baseline cell has |Δbpb| >= EPS at
          #   step >= min_steps.
          any_diverged = False
          for r in rows:
              ref = baseline.get((r["hidden"], r["seed"]))
              if ref is None:
                  continue
              if r["format"] in ("fp32", "f32") and r["algo"] == "adamw":
                  continue
              if r["step"] < min_steps:
                  continue
              if abs(r["bpb"] - ref) >= EPS:
                  any_diverged = True
                  break
          if offenders:
              print("\nFake-pass advisory (|Δbpb| < 1e-6 vs f32+adamw, step>=%d):"
                    % min_steps)
              for r, ref, delta in offenders:
                  print(f"  {r['format']}×{r['algo']} seed={r['seed']} "
                        f"h={r['hidden']} step={r['step']} "
                        f"bpb={r['bpb']} ref={ref} |Δ|={delta}")
          if not any_diverged and not advisory:
              eligible = [r for r in rows if r["step"] >= min_steps
                          and not (r["format"] in ("fp32", "f32") and r["algo"] == "adamw")]
              if eligible:
                  print("\nFAIL: NO non-baseline cell diverges from fp32+adamw. "
                        "FakeQuant / optimizer dispatch likely a no-op.",
                        file=sys.stderr)
                  sys.exit(1)
              else:
                  print("\nSkipping guard: no eligible cells "
                        f"(step >= {min_steps}).")
          print(f"\nAnti-fake-pass OK: at least one cell diverges from baseline "
                f"(min_steps={min_steps}, advisory={advisory}, "
                f"any_diverged={any_diverged}).")
          PY

  collect-ledger:
    name: Collect ledger (L-MATRIX-LEDGER · trios#380)
    needs: [cell, anti-fake-pass]
    # Run on schedule + manual dispatch only — PR smoke matrix has too few
    # cells to be worth a ledger refresh PR (and would spam main).
    if: ${{ always() && needs.cell.result == 'success' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/download-artifact@v4
        with:
          path: artefacts

      - name: Build matrix_ledger collector
        shell: bash
        run: cargo build --release --bin matrix_ledger

      - name: Collect per-cell artefacts → assertions/matrix_samples.jsonl
        shell: bash
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA:    ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p assertions
          ./target/release/matrix_ledger collect \
            --artefact-root artefacts \
            --out assertions/matrix_samples.jsonl \
            --commit-sha "$GITHUB_SHA" \
            --run-id "$GITHUB_RUN_ID"
          echo "----- ledger first 3 rows -----"
          head -3 assertions/matrix_samples.jsonl || true
          echo "----- total -----"
          wc -l assertions/matrix_samples.jsonl

      - name: Open ledger refresh PR
        # No-op when there's nothing to commit (matrix re-ran with identical
        # cells). Branch name is keyed by run_id so concurrent sweeps don't
        # collide.
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          # The ledger file lives under /assertions/ which is .gitignored,
          # so `git status --porcelain` returns empty even when the file
          # is freshly written. We detect changes by hashing the new file
          # and comparing against the blob hash on HEAD. Empty file or
          # unchanged content -> skip; everything else -> open PR.
          if [[ ! -s assertions/matrix_samples.jsonl ]]; then
            echo "[matrix_ledger] empty ledger file — skipping PR"
            exit 0
          fi
          NEW_HASH=$(git hash-object assertions/matrix_samples.jsonl)
          OLD_HASH=$(git rev-parse "HEAD:assertions/matrix_samples.jsonl" 2>/dev/null || echo "")
          if [[ -n "$OLD_HASH" && "$NEW_HASH" == "$OLD_HASH" ]]; then
            echo "[matrix_ledger] content identical to main — skipping PR"
            exit 0
          fi
          BRANCH="auto/matrix-ledger-${GITHUB_RUN_ID}"
          git config user.name  "trios-matrix-ledger-bot"
          git config user.email "matrix-ledger-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -f assertions/matrix_samples.jsonl
          ROWS=$(wc -l < assertions/matrix_samples.jsonl)
          HITS=$(grep -c '"falsifier_2_hit":true' assertions/matrix_samples.jsonl || true)
          git commit -m "chore(matrix-ledger): refresh assertions/matrix_samples.jsonl

          Auto-PR from format-algo-matrix workflow run ${GITHUB_RUN_ID}.

          rows=${ROWS} falsifier_2_hits=${HITS} commit_sha=${GITHUB_SHA}

          R4 trace block: assertions/igla_assertions.json::matrix_ledger
          R7 witness   : appendix/L-pollen-channel.tex §matrix-ledger
          refs trios#380 trios#446 trios#536

          [skip ci]"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(matrix-ledger): refresh assertions/matrix_samples.jsonl (run ${GITHUB_RUN_ID})" \
            --body  "Auto-PR from L-MATRIX-LEDGER (lane queen-order trios#380).
          
          - **rows**: ${ROWS}
          - **falsifier_2 hits**: ${HITS}
          - **commit_sha**: ${GITHUB_SHA}
          - **workflow run**: https://github.com/${{ github.repository }}/actions/runs/${GITHUB_RUN_ID}
          
          Anchor: \`phi^2 + phi^-2 = 3\`
          
          [skip ci]" \
            --base main \
            --head "$BRANCH"
