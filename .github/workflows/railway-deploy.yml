name: Railway Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'trios-trainer-igla/**'
  workflow_dispatch:
    inputs:
      seed:
        description: 'Seed number to deploy'
        required: true
        type: number
      image_tag:
        description: 'Docker image tag to deploy'
        required: false
        type: string
        default: 'latest'

jobs:
  deploy-seed-100:
    if: github.event.inputs.seed == 100
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to Railway
        run: |
          echo "${{ secrets.RAILWAY_TOKEN }}" | railway login
      - name: Deploy to Railway
        run: |
          railway up --service-name trainer-seed-100 -f ghashtag/trios-trainer-igla:latest --no-verify
  
  deploy-seed-101:
    if: github.event.inputs.seed == 101
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to Railway
        run: |
          echo "${{ secrets.RAILWAY_TOKEN }}" | railway login
      - name: Deploy to Railway
        run: |
          railway up --service-name trainer-seed-101 -f ghashtag/trios-trainer-igla:latest --no-verify
  
  deploy-seed-102:
    if: github.event.inputs.seed == 102
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to Railway
        run: |
          echo "${{ secrets.RAILWAY_TOKEN }}" | railway login
      - name: Deploy to Railway
        run: |
          railway up --service-name trainer-seed-102 -f ghashtag/trios-trainer-igla:latest --no-verify
  
  deploy-all:
    if: github.event.inputs.seed == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to Railway
        run: |
          echo "${{ secrets.RAILWAY_TOKEN }}" | railway login
      - name: Deploy all seeds
        run: |
          railway up --service-name trainer-seed-100 -f ghashtag/trios-trainer-igla:latest --no-verify
          railway up --service-name trainer-seed-101 -f ghashtag/trios-trainer-igla:latest --no-verify
          railway up --service-name trainer-seed-102 -f ghashtag/trios-trainer-igla:latest --no-verify
