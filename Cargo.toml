[package]
name        = "trios-trainer"
version     = "0.1.0"
edition     = "2021"
authors     = ["Dmitrii Vasilev <gierenmumindvy1t@hotmail.com>"]
license     = "MIT"
description = "Single source of truth for IGLA RACE training (gHashTag/trios#143). Portable Rust-only pipeline that runs on any CPU machine, Railway, Fly, or Docker. Anchor: phi^2 + phi^-2 = 3."
repository  = "https://github.com/gHashTag/trios-trainer-igla"
homepage    = "https://github.com/gHashTag/trios-trainer-igla"
readme      = "README.md"
keywords    = ["machine-learning", "training", "transformer", "jepa", "trios"]
categories  = ["science", "command-line-utilities"]

[lib]
name = "trios_trainer"
path = "src/lib.rs"

[[bin]]
name = "trios-train"
path = "src/bin/trios-train.rs"

[features]
# Default builds standalone with internal stub modules. No network deps required.
default = []
# Enable when running alongside the trios workspace — pulls invariants, ASHA and
# victory gate from the canonical implementations via git.
trios-integration = []
# Enable in CI to enforce embargo + triplet validation strictly.
ci-strict = []

[dependencies]
# Internal canonical crates (opt-in via `trios-integration` feature).
# Temporarily disabled due to submodule issue — use local path or fix submodule.
# trios-igla-race        = { git = "https://github.com/gHashTag/trios.git", branch = "main", optional = true }
# trios-precision-router = { git = "https://github.com/gHashTag/trios.git", branch = "main", optional = true }
# trios-phi-schedule     = { git = "https://github.com/gHashTag/trios.git", branch = "main", optional = true }
# trios-golden-float     = { git = "https://github.com/gHashTag/trios.git", branch = "main", optional = true }

# Standard
anyhow             = "1.0"
serde              = { version = "1.0", features = ["derive"] }
serde_json         = "1.0"
toml               = "0.8"
clap               = { version = "4.5", features = ["derive", "env"] }
chrono             = { version = "0.4", features = ["serde"] }
rand               = "0.8"
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
sha1               = "0.10"

[dev-dependencies]
tempfile = "3.10"
