[phases.setup]
nixPkgs = ["...", "gcc"]

[phases.build]
cmd = "cargo build --release --bin trios-train"

[start]
# P1 Optimizer Lab - supports config mode with TRIOS_CONFIG env var
# Falls back to CLI args if no config
cmd = "if [ -n \"$TRIOS_CONFIG\" ]; then ./target/release/trios-train --config \"$TRIOS_CONFIG\"; else ./target/release/trios-train --seed ${TRIOS_SEED:-43} --steps ${TRIOS_STEPS:-12000} --hidden ${TRIOS_HIDDEN:-256} --lr ${TRIOS_LR:-0.004} --attn-layers ${TRIOS_ATTN_LAYERS:-2} --eval-every ${TRIOS_EVAL_EVERY:-500} --optimizer ${TRIOS_OPTIMIZER:-adamw}; fi"

[env]
RUST_LOG = "info"
