[phases.setup]
nixPkgs = ["...", "gcc"]

[phases.build]
cmd = "rustup default stable && cargo build --release --bin trios-train"

[providers]
[rust]
runtime = "v1.91"  # Use Rust 1.91 for edition2024 support

[start]
# Supports both config mode and CLI args
# If TRIOS_CONFIG is set, use config mode (P0-P5 labs)
# Otherwise use CLI args with env var overrides
cmd = "if [ -n \"$TRIOS_CONFIG\" ]; then ./target/release/trios-train --config \"$TRIOS_CONFIG\"; else ./target/release/trios-train --seed ${TRIOS_SEED:-43} --steps ${TRIOS_STEPS:-27000} --hidden ${TRIOS_HIDDEN:-384} --lr ${TRIOS_LR:-0.004} --attn-layers ${TRIOS_ATTN_LAYERS:-2} --eval-every ${TRIOS_EVAL_EVERY:-1000} --optimizer ${TRIOS_OPTIMIZER:-adamw}; fi"
