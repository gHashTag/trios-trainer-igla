# Iterative Improvement V1: Hidden Dimension Sweep
# Hypothesis: Larger d_model reduces BPB further
# Based on: d=828 achieved BPB=2.1919 (gap to target: 0.34)

name = "iter-v1-hidden-sweep"
steps = 81000
target_bpb = 1.85

[model]
d_model = 1024  # UP from 828 (+23%)
n_layers = 2
n_heads = 8
vocab_size = 32000
seq_len = 1024
hybrid_attn = true

[optimizer]
kind = "adamw"
lr = 0.003
beta1 = 0.9
beta2 = 0.95
weight_decay = 0.04
schedule = "phi"
warmup_steps = 1000

[data]
corpus = "tiny_shakespeare"
train_path = "data/tiny_shakespeare.txt"
val_path = "data/tiny_shakespeare_val.txt"
batch_size = 4
batch_tokens = 524288

[objective]
w_ce = 1.0
w_jepa = 0.15
w_nca = 0.10

[ledger]
jsonl_path = "assertions/iter_v1_results.jsonl"
push = true
