# Gate-2 Final Configuration
# Frozen from P1+P2+P3+P4 winners.
# P5 runs this config on 3 seeds: 43, 44, 45
# Target: BPB < 1.85 at step >= 4000

name = "gate2-final"
steps = 40000
seed = 43
target_bpb = 1.85
champion_bpb = 2.2393

[model]
d_model = 384
n_layers = 4
n_heads = 6
vocab_size = 256
seq_len = 256
hybrid_attn = true

[optimizer]
kind = "muon"
lr = 0.0235
beta1 = 0.95
beta2 = 0.999
weight_decay = 0.01
schedule = "cosine"
warmup_steps = 2000

[data]
corpus = "fineweb"
train_path = "/data/fineweb_train.bin"
val_path = "/data/fineweb_val.bin"
batch_size = 32
batch_tokens = 8192

[objective]
w_ce = 0.5
w_jepa = 0.5
w_nca = 0.1

[ledger]
jsonl_path = "assertions/seed_results.jsonl"
push = true
embargo_path = "assertions/embargo.txt"
