# P1 Optimizer Lab — Muon (η2D=0.0235, η1D=0.007)
# Newton-Schulz orthogonalization, 7 NS steps, momentum=0.95

name        = "p1-muon"
steps       = 12_000
seed        = 43
target_bpb  = 2.00
champion_bpb = 2.2393

[model]
d_model     = 256
n_layers    = 2
n_heads     = 4
vocab_size  = 32_000
seq_len     = 1024
hybrid_attn = false

[optimizer]
kind          = "muon"
lr            = 0.0235    # η2D — 2D learning rate per IMU-1
beta1         = 0.95       # momentum
beta2         = 0.95
weight_decay  = 0.01        # lower than AdamW per Muon spec
schedule      = "phi"
warmup_steps  = 500

# Muon-specific parameters
# η1D: 1D learning rate for embedding/output layers
muon_eta_1d = 0.007
# NS steps: number of Newton-Schulz iterations
muon_ns_steps = 7

[data]
corpus       = "fineweb"
train_path   = "/data/fineweb_train.bin"
val_path     = "/data/fineweb_val.bin"
batch_size   = 4
batch_tokens = 524_288

[objective]
w_ce   = 1.0
w_jepa = 0.0
w_nca  = 0.0

[ledger]
jsonl_path    = "assertions/lab/p1_leaderboard.jsonl"
push          = false
embargo_path  = ".embargo"
