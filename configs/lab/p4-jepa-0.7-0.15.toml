# P4 Multi-Objective — JEPA + NCA sweep
# Sweep: {(0.7,0.15)}

name        = "p4-jepa-0.7-0.15"
steps       = 12_000
seed        = 43
target_bpb  = 2.00
champion_bpb = 2.2393

[model]
d_model     = 256
n_layers    = 2
n_heads     = 4
vocab_size  = 32_000
seq_len     = 1024
hybrid_attn = false

[optimizer]
kind          = "adamw"
lr            = 0.004     # α_φ / φ³  — INV-8 φ-band
beta1         = 0.9
beta2         = 0.95
weight_decay  = 0.04
schedule      = "phi"
warmup_steps  = 500

[data]
corpus       = "fineweb"
train_path   = "/data/fineweb_train.bin"
val_path     = "/data/fineweb_val.bin"
batch_size   = 4
batch_tokens = 524_288

[objective]
w_ce   = 1.0
w_jepa = 0.7
w_nca  = 0.15    # Sweep value 15%

[ledger]
jsonl_path    = "assertions/lab/p4_objective.jsonl"
push          = false
embargo_path  = ".embargo"

[ema]
enable = false    # EMA disabled for JEPA+NCA sweep
n_checkpoints = 0
