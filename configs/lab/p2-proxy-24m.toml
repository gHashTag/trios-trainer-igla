name = "p2-proxy-24m"
steps = 12000
seed = 43
target_bpb = 1.85
champion_bpb = 2.2393

[model]
d_model = 128
n_layers = 2
n_heads = 4
vocab_size = 256
seq_len = 128
hybrid_attn = true

[optimizer]
kind = "adamw"
lr = 0.004
beta1 = 0.9
beta2 = 0.999
weight_decay = 0.01
schedule = "cosine"
warmup_steps = 1000

[data]
corpus = "fineweb"
train_path = "/data/fineweb_train.bin"
val_path = "/data/fineweb_val.bin"
batch_size = 32
batch_tokens = 4096

[objective]
w_ce = 0.5
w_jepa = 0.25
w_nca = 0.25

[ledger]
jsonl_path = "assertions/lab/p2_transfer.jsonl"
push = false
embargo_path = "assertions/embargo.txt"
