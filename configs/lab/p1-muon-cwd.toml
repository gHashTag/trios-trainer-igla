# P1 Optimizer Lab — Muon + Cautious Weight Decay
# IMU-1 shows CWD adds -0.97% on top of Muon

name        = "p1-muon-cwd"
steps       = 12_000
seed        = 43
target_bpb  = 2.00
champion_bpb = 2.2393

[model]
d_model     = 256
n_layers    = 2
n_heads     = 4
vocab_size  = 32_000
seq_len     = 1024
hybrid_attn = false

[optimizer]
kind          = "muon"
lr            = 0.0235    # η2D — 2D learning rate per IMU-1
beta1         = 0.95       # momentum
beta2         = 0.95
weight_decay  = 0.03        # Cautious Weight Decay (lower than baseline)
schedule      = "phi"
warmup_steps  = 500

# Muon-specific parameters
muon_eta_1d = 0.007
muon_ns_steps = 7
muon_use_cwd = true  # Enable Cautious Weight Decay per IMU-1

[data]
corpus       = "fineweb"
train_path   = "/data/fineweb_train.bin"
val_path     = "/data/fineweb_val.bin"
batch_size   = 4
batch_tokens = 524_288

[objective]
w_ce   = 1.0
w_jepa = 0.0
w_nca  = 0.0

[ledger]
jsonl_path    = "assertions/lab/p1_leaderboard.jsonl"
push          = false
embargo_path  = ".embargo"
