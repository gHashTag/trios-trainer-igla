# Champion baseline reproduction.
# Reference SHA: 2446855 (gHashTag/trios) — BPB=2.2393 @ 27K seed=43.
# Standing rule: this config must reproduce 2.2393 ± 0.01 on a fresh checkout.

name        = "champion"
steps       = 27_000
seed        = 43
target_bpb  = 1.50
champion_bpb = 2.2393

[model]
d_model     = 256
n_layers    = 2
n_heads     = 4
vocab_size  = 32_000
seq_len     = 1024
hybrid_attn = false

[optimizer]
kind          = "adamw"
lr            = 0.004     # α_φ / φ³  — INV-8 φ-band
beta1         = 0.9
beta2         = 0.95
weight_decay  = 0.04
schedule      = "phi"
warmup_steps  = 500

[data]
corpus       = "fineweb"
batch_size   = 4
batch_tokens = 524_288

[objective]
w_ce   = 1.0
w_jepa = 0.0
w_nca  = 0.0

[ledger]
jsonl_path    = "assertions/seed_results.jsonl"
push          = false
embargo_path  = ".embargo"
